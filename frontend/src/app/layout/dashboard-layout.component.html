<div class="app-container">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      LTE Control
    </div>
    <nav style="flex: 1; padding: 1.5rem 0">
      <div style="padding: 0 1.5rem; margin-bottom: 0.75rem; font-size: 0.75rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em">
        List
      </div>
      <a routerLink="/search" routerLinkActive="active" class="nav-item">
        <lucide-icon [img]="Search" [size]="18"></lucide-icon> Search User
      </a>
      
      <div style="padding: 0 1.5rem; margin: 2rem 0 0.75rem; font-size: 0.75rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em">
        Operations
      </div>
      <a routerLink="/add" routerLinkActive="active" class="nav-item">
        <lucide-icon [img]="UserPlus" [size]="18"></lucide-icon> Add User
      </a>
      <a routerLink="/delete" routerLinkActive="active" class="nav-item">
        <lucide-icon [img]="UserMinus" [size]="18"></lucide-icon> Delete User
      </a>
      <a routerLink="/modify" routerLinkActive="active" class="nav-item">
        <lucide-icon [img]="UserCog" [size]="18"></lucide-icon> Modify User
      </a>
    </nav>
    
    <div style="padding: 1.5rem; border-top: 1px solid var(--glass-border)">
      <div style="font-size: 0.7rem; color: var(--text-muted); text-align: center">
        Copyright © 2026 All rights reserved.<br/>
        IT Solution & DevOps
      </div>
    </div>
  </aside>

  <!-- Main Panel -->
  <main class="main-content">
    <header class="top-header glass-header">
      <div style="display: flex; align-items: center; gap: 2rem">
        <nav class="top-nav">
          <a href="#">Home</a>
          <a href="#">PSTN</a>
          <a href="#">FTTH</a>
          <a href="#">VoLTE</a>
          <a href="#">VoBB</a>
          <a href="#">IP-Endpoint</a>
          <a href="#" class="active" style="color: var(--accent-color); border-bottom: 2px solid var(--accent-color); padding-bottom: 1.3rem">LTE</a>
        </nav>
      </div>
      
      <div style="display: flex; align-items: center; gap: 0.75rem; color: var(--text-main); cursor: pointer">
        <div style="width: 30px; height: 30px; border-radius: 50%; background: rgba(59, 130, 246, 0.15); display: flex; align-items: center; justify-content: center">
          <lucide-icon [img]="User" [size]="16" color="var(--accent-color)"></lucide-icon>
        </div>
        <span style="font-weight: 500; font-size: 0.9rem">Admin User</span>
      </div>
    </header>

    <section class="page-content">
      <router-outlet></router-outlet>
    </section>
  </main>
</div>

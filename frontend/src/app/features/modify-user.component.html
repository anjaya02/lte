<div class="glass-panel" style="max-width: 800px; margin: 0 auto">
  <div style="padding: 1.5rem 2rem; border-bottom: 1px solid var(--glass-border)">
    <h2 style="margin: 0; font-size: 1.25rem">Modify User</h2>
  </div>

  <div class="panel-section">
    <div *ngIf="status.msg" [ngClass]="['status-msg', status.type === 'error' ? 'status-error' : 'status-success']">
      {{ status.msg }}
    </div>
    
    <div class="form-group">
      <label class="form-label">LTE SUB</label>
      <input 
        type="text" 
        class="form-input" 
        placeholder="Enter LTE SUB" 
        [(ngModel)]="sub"
      />
    </div>
    
    <div class="form-group">
      <label class="form-label">LTE PKG</label>
      <input 
        type="text" 
        class="form-input" 
        placeholder="Enter new LTE PKG" 
        [(ngModel)]="pkg"
      />
    </div>

    <div class="form-group" style="margin-top: 2rem">
      <div class="form-label"></div>
      <button class="btn" (click)="handleUpdate()">
        <lucide-icon [img]="SaveIcon" [size]="16"></lucide-icon> Update
      </button>
    </div>
  </div>
</div>
